<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arushanyan Build</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo-box">
      <img src="img/IMG_2.jpg" alt="Logo" class="logo">
      <h1>Arushanyan Build Renovation</h1>
    </div>

    <nav class="nav">
      <a href="about.html">About Us</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <img src="img/img1.jpg" alt="Construction" class="hero-img">
  </section>

  <!-- CALCULATOR -->
  <section class="calculator">
    <h2>Քմ Հաշվիչ</h2>

    <div class="input-group">
      <label>Լայնություն (մ)</label>
      <input type="number" id="width" placeholder="Լայնություն">
    </div>

    <div class="input-group">
      <label>Բարձրություն (մ)</label>
      <input type="number" id="height" placeholder="Բարձրություն">
    </div>

    <div class="input-group">
      <label>Խորություն (մ)</label>
      <input type="number" id="depth" placeholder="Optional">
    </div>

    <button onclick="calculateArea()">Հաշվել</button>

    <div id="result"></div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Հեռ․ <a href="tel:+37455255255">+374 55 255255</a></p>
    <p>
      <a href="https://www.instagram.com/arushanyanbuild" target="_blank">
        @arushanyanbuild
      </a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
